<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágape Premium</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* Layout Principal */
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 1000px; margin: 0 auto; background: var(--card); }
        header { padding: 15px 20px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Chat Box */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; }
        .msg { background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px; max-width: 85%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); }
        .msg.me { align-self: flex-end; background: var(--primary); border: none; }
        .msg b { display: block; font-size: 0.8em; margin-bottom: 4px; color: #a5b4fc; }
        
        /* Controles */
        #controls { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.2); }
        input[type="text"] { flex: 1; background: #334155; border: none; padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        button { background: var(--primary); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.1); filter: brightness(1.2); }
        
        /* Janela de Vídeo Suspensa (Floating) */
        #video-window { 
            position: fixed; top: 20px; right: 20px; width: 350px; height: 250px; 
            background: black; border-radius: 15px; overflow: hidden; display: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); z-index: 1000; resize: both;
        }
        #video-header { background: #334155; padding: 8px; cursor: move; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<header>
    <div><i class="fas fa-circle" style="color: #22c55e; font-size: 10px;"></i> <b>{{ room }}</b></div>
    <div><i class="fas fa-user"></i> {{ user }}</div>
    <button onclick="toggleVideo()" title="Chamada de Vídeo" style="width: auto; border-radius: 20px; padding: 0 15px;">
        <i class="fas fa-video"></i>
    </button>
</header>

<div id="video-window">
    <div id="video-header">
        <span><i class="fas fa-video"></i> Ao vivo</span>
        <i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer"></i>
    </div>
    <div id="jitsi-container" style="height: calc(100% - 30px);"></div>
</div>

<div id="main-wrapper">
    <div id="chat-box">
        {% for m in history %}
        <div class="msg {% if m.user == user %}me{% endif %}">
            <b>{{ m.user }}</b>
            <div>{{ m.text|safe }}</div>
            <small style="opacity: 0.6; font-size: 0.7em;">{{ m.time }}</small>
        </div>
        {% endfor %}
    </div>

    <div id="controls">
        <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        <button onclick="document.getElementById('fileInput').click()" style="background: #475569;"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="messageInput" placeholder="Sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let jitsiApi = null;

    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            const options = {
                roomName: "Agape_" + room,
                parentNode: document.getElementById('jitsi-container'),
                width: '100%', height: '100%',
                userInfo: { displayName: user }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        } else {
            win.style.display = 'none';
            if(jitsiApi) jitsiApi.dispose();
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if(input.value.trim()){
            socket.emit('send_message', {user, room, message: input.value});
            input.value = '';
        }
    }

    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0];
        const fd = new FormData();
        fd.append('file', file); fd.append('user', user); fd.append('room', room);
        await fetch('/upload', {method: 'POST', body: fd});
    }

    socket.on('receive_message', (data) => {
        const chat = document.getElementById('chat-box');
        const isMe = data.user === user ? 'me' : '';
        chat.innerHTML += `<div class="msg ${isMe}"><b>${data.user}</b>${data.text}<br><small>${data.time}</small></div>`;
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
