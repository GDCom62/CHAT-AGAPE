<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágape Premium</title>
    <script src="https://cloudflare.com"></script>
    <!-- Importante: Font Awesome para os ícones aparecerem -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { 
            --primary: #4f46e5; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text-main: #ffffff; 
            --text-dim: #94a3b8; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho */
        header { 
            padding: 15px 25px; 
            background: var(--card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
        }

        /* Área do Chat */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .msg { 
            background: #334155; 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.4;
            color: #ffffff; /* Contraste máximo */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .msg b { color: #818cf8; display: block; margin-bottom: 5px; font-size: 0.9em; }

        /* Barra de Ferramentas Inferior */
        #controls { 
            background: var(--card); 
            padding: 20px; 
            display: flex; 
            gap: 15px; 
            align-items: center;
            border-top: 1px solid #334155;
        }

        input[type="text"] { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid #475569; 
            padding: 12px 20px; 
            border-radius: 25px; 
            color: #ffffff; 
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        /* Botões */
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.2s;
            color: white;
        }

        .btn-video { background: #22c55e; }
        .btn-file { background: #64748b; }
        .btn-send { background: var(--primary); width: 60px; border-radius: 15px; }
        .btn:hover { transform: scale(1.1); filter: brightness(1.1); }

        /* Janela Suspensa de Vídeo */
        #video-window { 
            position: fixed; top: 80px; right: 20px; width: 320px; height: 240px; 
            background: #000; border-radius: 12px; overflow: hidden; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999;
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

<header>
    <div><b style="color:var(--primary)">SALA:</b> {{ room }}</div>
    <div><i class="fas fa-user"></i> <b>{{ user }}</b></div>
    <button class="btn btn-video" onclick="toggleVideo()" title="Vídeo Chamada">
        <i class="fas fa-video"></i>
    </button>
</header>

<!-- Janela Flutuante -->
<div id="video-window" id="draggable">
    <div style="background: #1e293b; padding: 5px 10px; display: flex; justify-content: space-between; font-size: 12px;">
        <span>Câmera Ao Vivo</span>
        <i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer"></i>
    </div>
    <div id="jitsi-container" style="height: calc(100% - 25px);"></div>
</div>

<div id="chat-box">
    {% for m in history %}
    <div class="msg">
        <b>{{ m.user }}</b>
        <span>{{ m.text|safe }}</span>
        <div style="text-align: right; font-size: 10px; margin-top: 5px; color: var(--text-dim);">{{ m.time }}</div>
    </div>
    {% endfor %}
</div>

<div id="controls">
    <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
    <button class="btn btn-file" onclick="document.getElementById('fileInput').click()" title="Anexar Arquivo">
        <i class="fas fa-paperclip"></i>
    </button>
    
    <input type="text" id="messageInput" placeholder="Escreva aqui..." onkeypress="if(event.key==='Enter') sendMessage()">
    
    <button class="btn btn-send" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
    </button>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let jitsiApi = null;

    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            const options = {
                roomName: "Agape_" + room,
                parentNode: document.getElementById('jitsi-container'),
                width: '100%', height: '100%',
                userInfo: { displayName: user }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        } else {
            win.style.display = 'none';
            if(jitsiApi) jitsiApi.dispose();
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if(input.value.trim()){
            socket.emit('send_message', {user, room, message: input.value});
            input.value = '';
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) return;
        
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        fd.append('user', user);
        fd.append('room', room);

        try {
            await fetch('/upload', {method: 'POST', body: fd});
            fileInput.value = '';
        } catch (err) {
            alert("Erro ao subir arquivo");
        }
    }

    socket.on('receive_message', (data) => {
        const chat = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${data.user}</b><span>${data.text}</span><div style="text-align: right; font-size: 10px; margin-top: 5px; color: var(--text-dim);">${data.time}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });

    window.onload = () => {
        const chat = document.getElementById('chat-box');
        chat.scrollTop = chat.scrollHeight;
    };
</script>

</body>
</html>
