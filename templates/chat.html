<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ágape Premium Chat</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --card: #1e293b; --logo-url: url('/logo.png'); }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        
        /* Barra Lateral */
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #334155; text-align: center; }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-online { padding: 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 5px #22c55e; }

        /* Área de Chat */
        #chat-main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { background: #334155; padding: 12px 15px; border-radius: 15px; max-width: 80%; position: relative; padding-left: 55px; min-height: 40px; }
        .msg::before { content: ""; position: absolute; left: 10px; top: 10px; width: 35px; height: 35px; background: var(--logo-url) center/contain no-repeat; border-radius: 50%; background-color: #fff; }

        /* Controles */
        #controls { padding: 20px; background: var(--card); display: flex; gap: 12px; align-items: center; border-top: 1px solid #334155; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px 20px; border-radius: 25px; color: #fff; outline: none; }
        .btn-circle { border: none; cursor: pointer; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2em; transition: 0.3s; }
        
        .btn-send { background: var(--primary); }
        .btn-file { background: #64748b; }
        .btn-video { background: #22c55e; font-size: 0.9em; width: auto; padding: 0 15px; border-radius: 10px; }

        #video-window { position: fixed; top: 80px; right: 20px; width: 320px; height: 240px; background: #000; border-radius: 12px; display: none; border: 2px solid var(--primary); z-index: 1000; overflow: hidden; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header"><i class="fas fa-users"></i> IRMÃOS ONLINE</div>
    <div id="user-list">Buscando...</div>
</div>

<div id="chat-main">
    <header>
        <span><img src="/logo.png" height="30" onerror="this.style.display='none'"> <b>ÁGAPE PREMIUM</b></span>
        <button class="btn-circle btn-video" onclick="toggleVideo()"><i class="fas fa-video"></i> &nbsp; VÍDEO</button>
    </header>

    <div id="video-window">
        <div style="background:#1e293b; padding:5px 10px; font-size:11px; display:flex; justify-content:space-between;">
            <span>AO VIVO</span><i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer"></i>
        </div>
        <div id="jitsi-container" style="height: calc(100% - 25px);"></div>
    </div>

    <div id="chat-box">
        {% for m in history %}
        <div class="msg"><b>{{ m.user }}</b>: {{ m.text|safe }}</div>
        {% endfor %}
    </div>

    <div id="controls">
        <!-- Input de arquivo escondido -->
        <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        
        <!-- Botão de Anexo -->
        <button class="btn-circle btn-file" onclick="document.getElementById('fileInput').click()" title="Anexar">
            <i class="fas fa-paperclip"></i>
        </button>

        <input type="text" id="mIn" placeholder="Sua mensagem..." onkeypress="if(event.key==='Enter') send()">

        <!-- Botão de Enviar -->
        <button class="btn-circle btn-send" onclick="send()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "Geral";
    let jitsiApi = null;

    // 1. CARREGAR MEMBROS ONLINE (REDIS)
    async function updateOnlineList() {
        try {
            const res = await fetch('/usuarios');
            const data = await res.json();
            const list = document.getElementById('user-list');
            list.innerHTML = data.map(u => 
                `<div class="user-online"><div class="dot"></div> ${u}</div>`
            ).join('');
        } catch(e) { console.error("Erro na lista"); }
    }

    // 2. ENVIAR MENSAGEM
    function send() {
        const i = document.getElementById('mIn');
        if(i.value.trim()){
            socket.emit('send_message', {user: user, room: room, message: i.value});
            i.value = '';
        }
    }

    // 3. ENVIAR ARQUIVO
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) return;
        
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        fd.append('user', user);
        fd.append('room', room);

        await fetch('/upload', {method: 'POST', body: fd});
        fileInput.value = '';
    }

    // 4. CHAMADA DE VÍDEO
    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "Agape_" + room,
                parentNode: document.getElementById('jitsi-container'),
                userInfo: { displayName: user }
            });
        } else {
            win.style.display = 'none';
            if(jitsiApi) jitsiApi.dispose();
        }
    }

    // ESCUTAR NOVAS MENSAGENS
    socket.on('receive_message', data => {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg"><b>${data.user}</b>: ${data.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    // INICIAR FUNÇÕES
    setInterval(updateOnlineList, 5000);
    updateOnlineList();
</script>
</body>
</html>
