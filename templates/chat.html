<!-- ... (mesmo head e style do anterior) ... -->
<body>
<div id="sidebar">
    <h3 style="color: #4f46e5">🟢 ONLINE</h3>
    <div id="user-list"></div>
</div>
<div id="chat-main">
    <header style="padding:15px; background:#1e293b; display:flex; justify-content:space-between;">
        <span><img src="/logo.png" height="30"> <b>ÁGAPE PREMIUM</b></span>
        <button onclick="toggleVideo()" style="background:#22c55e; color:#fff; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;"><i class="fas fa-video"></i> VÍDEO</button>
    </header>
    <div id="video-window" style="display:none; height:250px;"><div id="jitsi-container" style="height:100%"></div></div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px;">
        {% for m in history %}<div class="msg" style="background:#334155; padding:12px; margin-bottom:10px; border-radius:10px;"><b>{{m.user}}</b>: {{m.text|safe}}</div>{% endfor %}
    </div>
    <div id="controls" style="padding:20px; background:#1e293b; display:flex; gap:10px;">
        <!-- BOTÃO DO CLIP RESTAURADO -->
        <input type="file" id="fIn" style="display:none" onchange="up()">
        <button onclick="document.getElementById('fIn').click()" style="background:#64748b; color:#fff; border:none; border-radius:50%; width:45px; height:45px; cursor:pointer;"><i class="fas fa-paperclip"></i></button>
        
        <input type="text" id="mIn" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:20px; background:#0f172a; color:#fff; border:1px solid #475569;">
        <button onclick="send()" style="background:#4f46e5; color:#fff; border:none; border-radius:50%; width:45px; height:45px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
<script>
    const socket = io(); const user = "{{user}}";
    async function getOnline() {
        const r = await fetch('/usuarios'); const us = await r.json();
        document.getElementById('user-list').innerHTML = us.map(u => `<div style="padding:8px; font-size:14px;">● ${u}</div>`).join('');
    }
    async function up() {
        const fileInput = document.getElementById('fIn');
        const fd = new FormData(); fd.append('file', fileInput.files[0]); fd.append('user', user);
        await fetch('/upload', {method:'POST', body:fd});
        fileInput.value = '';
    }
    function send() {
        const i = document.getElementById('mIn');
        if(i.value){ socket.emit('send_message', {user, message: i.value}); i.value=''; }
    }
    socket.on('receive_message', d => {
        document.getElementById('chat-box').innerHTML += `<div class="msg" style="background:#334155; padding:12px; margin-bottom:10px; border-radius:10px;"><b>${d.user}</b>: ${d.text}</div>`;
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    });
    setInterval(getOnline, 5000); getOnline();
</script>
</body>
</html>
