<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Ágape Pro</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        #video-container { width: 40%; background: #000; display: none; border-right: 2px solid #ccc; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); max-width: 80%; }
        #controls { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-send { background: #007bff; color: white; }
        .btn-video { background: #28a745; color: white; }
        .btn-file { background: #6c757d; color: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="video-container">
    <div id="jitsi-container" style="height: 100%;"></div>
</div>

<div id="chat-container">
    <h3 style="text-align: center; margin: 10px;">Sala: {{ room }} | Usuário: {{ user }}</h3>
    
    <div id="chat-box">
        {% for m in history %}
        <div class="msg">
            <b>{{ m.user }}</b>: {{ m.text|safe }} <br>
            <small style="color: #888;">{{ m.time }}</small>
        </div>
        {% endfor %}
    </div>

    <div id="controls">
        <button class="btn-video" onclick="toggleVideo()">📹 Vídeo</button>
        
        <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
        <button class="btn-file" onclick="document.getElementById('fileInput').click()">📎</button>
        
        <input type="text" id="messageInput" placeholder="Digite uma mensagem..." autocomplete="off">
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let jitsiApi = null;

    // --- FUNÇÃO DE VÍDEO (JITSI) ---
    function toggleVideo() {
        const container = document.getElementById('video-container');
        if (container.style.display === 'none' || container.style.display === '') {
            container.style.display = 'block';
            const options = {
                roomName: "AgapeRoom_" + room,
                parentNode: document.getElementById('jitsi-container'),
                userInfo: { displayName: user }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        } else {
            container.style.display = 'none';
            if (jitsiApi) jitsiApi.dispose();
        }
    }

    // --- FUNÇÃO DE MENSAGEM ---
    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (input.value.trim() !== "") {
            socket.emit('send_message', {
                user: user,
                room: room,
                message: input.value
            });
            input.value = "";
        }
    }

    // --- FUNÇÃO DE UPLOAD ---
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) return;

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('user', user);
        formData.append('room', room);

        // Mostra um aviso visual simples
        console.log("Enviando arquivo...");
        
        try {
            await fetch('/upload', { method: 'POST', body: formData });
            fileInput.value = ''; // Limpa o campo
        } catch (err) {
            alert("Erro ao enviar arquivo");
        }
    }

    // --- RECEBER MENSAGENS ---
    socket.on('receive_message', (data) => {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${data.user}</b>: ${data.text} <br><small style="color:#888;">${data.time}</small>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Rolar para baixo ao carregar
    window.onload = () => {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    };
</script>

</body>
</html>
