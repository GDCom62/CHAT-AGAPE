<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágape Premium</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { 
            --primary: #4f46e5; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text-main: #ffffff; 
            --text-dim: #94a3b8; 
            --logo-url: url('/logo.png'); /* Busca o arquivo logo.png da sua raiz */
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }

        header { padding: 10px 25px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo-header { height: 40px; width: auto; vertical-align: middle; margin-right: 10px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Mini Logo nas Mensagens */
        .msg { 
            background: #334155; padding: 12px 18px; border-radius: 15px; max-width: 75%; 
            position: relative; padding-left: 55px; min-height: 40px; align-self: flex-start;
        }
        .msg::before {
            content: ""; position: absolute; left: 10px; top: 12px; width: 35px; height: 35px;
            background: var(--logo-url) center/contain no-repeat; border-radius: 50%; background-color: #fff;
        }

        .msg b { color: #818cf8; display: block; margin-bottom: 5px; font-size: 0.8em; }

        /* Janela de Vídeo com Marca d'água */
        #video-window { 
            position: fixed; top: 85px; right: 20px; width: 320px; height: 240px; 
            background: #000; border-radius: 15px; overflow: hidden; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 9999; border: 2px solid var(--primary);
        }
        .watermark {
            position: absolute; bottom: 15px; right: 15px; width: 60px; height: 30px;
            background: var(--logo-url) center/contain no-repeat; opacity: 0.5; pointer-events: none; z-index: 10000;
        }

        /* Controles */
        #controls { background: var(--card); padding: 20px; display: flex; gap: 15px; align-items: center; border-top: 1px solid #334155; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 15px 20px; border-radius: 30px; color: #ffffff; outline: none; }
        .btn { border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; min-width: 60px; }
        .btn-video { background: #22c55e; height: 50px; border-radius: 12px; flex-direction: row; gap: 8px; padding: 0 15px; }
        .btn-send { background: var(--primary); height: 55px; border-radius: 15px; }
        .btn-file { background: #64748b; height: 55px; border-radius: 15px; }
    </style>
</head>
<body>

<header>
    <div>
        <img src="/logo.png" class="logo-header" alt="Logo">
        <b style="color:var(--primary); font-size: 1.2em;">ÁGAPE</b>
    </div>
    <button class="btn btn-video" onclick="toggleVideo()">
        <i class="fas fa-video"></i> <span>VÍDEO</span>
    </button>
</header>

<div id="video-window">
    <div style="background: #1e293b; padding: 8px 12px; display: flex; justify-content: space-between; font-size: 11px;">
        <span>AO VIVO</span>
        <i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer"></i>
    </div>
    <div class="watermark"></div>
    <div id="jitsi-container" style="height: calc(100% - 30px);"></div>
</div>

<div id="chat-box">
    {% for m in history %}
    <div class="msg">
        <b>{{ m.user }}</b>
        <span>{{ m.text|safe }}</span>
        <div style="text-align: right; font-size: 9px; color: var(--text-dim);">{{ m.time }}</div>
    </div>
    {% endfor %}
</div>

<div id="controls">
    <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
    <button class="btn btn-file" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-paperclip"></i>
        <span>ANEXAR</span>
    </button>
    <input type="text" id="messageInput" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="btn btn-send" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
        <span>ENVIAR</span>
    </button>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let jitsiApi = null;

    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            const options = {
                roomName: "Agape_" + room, parentNode: document.getElementById('jitsi-container'),
                width: '100%', height: '100%', userInfo: { displayName: user }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        } else {
            win.style.display = 'none';
            if(jitsiApi) jitsiApi.dispose();
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if(input.value.trim()){
            socket.emit('send_message', {user, room, message: input.value});
            input.value = '';
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        fd.append('user', user); fd.append('room', room);
        await fetch('/upload', {method: 'POST', body: fd});
        fileInput.value = '';
    }

    socket.on('receive_message', (data) => {
        const chat = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${data.user}</b><span>${data.text}</span><div style="text-align:right; font-size:9px;">${data.time}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
