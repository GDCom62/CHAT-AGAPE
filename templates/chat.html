<!DOCTYPE html>
<html>
<head>
    <title>Ágape Chat</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --card: #1e293b; --logo-url: url('/logo.png'); }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: var(--bg); color: #fff; }
        #sidebar { width: 250px; background: var(--card); border-right: 1px solid #334155; padding: 15px; }
        #chat-main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: #334155; padding: 12px; border-radius: 12px; margin-bottom: 10px; position: relative; padding-left: 50px; }
        .msg::before { content: ""; position: absolute; left: 10px; top: 10px; width: 30px; height: 30px; background: var(--logo-url) center/contain no-repeat; border-radius: 50%; background-color: #fff; }
        .user-item { padding: 8px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border-radius: 5px; font-size: 14px; }
        #video-window { position: fixed; top: 70px; right: 20px; width: 300px; height: 220px; background: #000; border-radius: 10px; display: none; border: 2px solid var(--primary); }
        #controls { padding: 20px; display: flex; gap: 10px; background: var(--card); }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 20px; color: #fff; }
    </style>
</head>
<body>
<div id="sidebar">
    <h3 style="color: var(--primary)">👥 Membros</h3>
    <div id="user-list">Carregando...</div>
</div>
<div id="chat-main">
    <header>
        <span><img src="/logo.png" height="30"> <b>ÁGAPE</b></span>
        <button onclick="toggleVideo()" style="background:#22c55e; color:#fff; border:none; padding:8px 15px; border-radius:10px;"><i class="fas fa-video"></i> VÍDEO</button>
    </header>
    <div id="video-window"><div id="jitsi-container" style="height:100%"></div></div>
    <div id="chat-box">
        {% for m in history %}<div class="msg"><b>{{m.user}}</b>: {{m.text|safe}}</div>{% endfor %}
    </div>
    <div id="controls">
        <input type="file" id="fIn" style="display:none" onchange="up()">
        <button onclick="document.getElementById('fIn').click()" style="background:#64748b; color:#fff; border:none; border-radius:50%; width:40px;"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="mIn" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--primary); color:#fff; border:none; border-radius:50%; width:40px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
<script src="https://jit.si"></script>
<script>
    const socket = io(); const user = "{{user}}"; const room = "{{room}}";
    async function getUs() {
        const r = await fetch('/usuarios'); const us = await r.json();
        document.getElementById('user-list').innerHTML = us.map(u => `<div class="user-item">🟢 ${u}</div>`).join('');
    }
    function toggleVideo() {
        const v = document.getElementById('video-window');
        if(v.style.display==='none' || !v.style.display){
            v.style.display='block';
            new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Agape_"+room, parentNode: document.getElementById('jitsi-container'), userInfo: {displayName: user} });
        } else { v.style.display='none'; }
    }
    function send() {
        const i = document.getElementById('mIn');
        if(i.value){ socket.emit('send_message', {user, room, message: i.value}); i.value=''; }
    }
    async function up() {
        const fd = new FormData(); fd.append('file', document.getElementById('fIn').files[0]);
        fd.append('user', user); fd.append('room', room);
        await fetch('/upload', {method:'POST', body:fd});
    }
    socket.on('receive_message', d => {
        const b = document.getElementById('chat-box');
        b.innerHTML += `<div class="msg"><b>${d.user}</b>: ${d.text}</div>`; b.scrollTop = b.scrollHeight;
    });
    getUs();
</script>
</body>
</html>
