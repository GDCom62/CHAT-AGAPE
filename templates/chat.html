<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágape Premium</title>
    <script src="https://cloudflare.com"></script>
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { 
            --primary: #4f46e5; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text-main: #ffffff; 
            --text-dim: #94a3b8; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho */
        header { 
            padding: 15px 25px; 
            background: var(--card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Área do Chat */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        .msg { 
            background: #334155; 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.4;
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg b { color: #818cf8; display: block; margin-bottom: 5px; font-size: 0.9em; }

        /* Barra de Ferramentas Inferior */
        #controls { 
            background: var(--card); 
            padding: 20px; 
            display: flex; 
            gap: 15px; 
            align-items: center;
            border-top: 1px solid #334155;
        }

        input[type="text"] { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid #475569; 
            padding: 15px 20px; 
            border-radius: 30px; 
            color: #ffffff; 
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(79, 70, 229, 0.4); }

        /* Botões Estilizados */
        .btn {
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: white;
            min-width: 60px;
        }

        .btn i { font-size: 1.4em; margin-bottom: 4px; color: white !important; }
        .btn span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .btn-video { background: #22c55e; height: 50px; border-radius: 12px; padding: 5px 15px; flex-direction: row; gap: 8px; }
        .btn-file { background: #64748b; height: 55px; border-radius: 15px; }
        .btn-send { background: var(--primary); height: 55px; border-radius: 15px; }

        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Janela Suspensa de Vídeo */
        #video-window { 
            position: fixed; top: 85px; right: 20px; width: 320px; height: 240px; 
            background: #000; border-radius: 15px; overflow: hidden; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 9999;
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

<header>
    <div><b style="color:var(--primary); letter-spacing: 1px;">ÁGAPE</b> <span style="margin-left:10px; color:var(--text-dim)">| {{ room }}</span></div>
    <div style="font-size: 0.9em;"><i class="fas fa-user-circle"></i> {{ user }}</div>
    <button class="btn btn-video" onclick="toggleVideo()">
        <i class="fas fa-video"></i> <span>VÍDEO</span>
    </button>
</header>

<div id="video-window">
    <div style="background: #1e293b; padding: 8px 12px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold;">
        <span><i class="fas fa-broadcast-tower" style="color:#ef4444"></i> CÂMERA AO VIVO</span>
        <i class="fas fa-times" onclick="toggleVideo()" style="cursor:pointer; font-size: 14px;"></i>
    </div>
    <div id="jitsi-container" style="height: calc(100% - 30px);"></div>
</div>

<div id="chat-box">
    {% for m in history %}
    <div class="msg">
        <b>{{ m.user }}</b>
        <span>{{ m.text|safe }}</span>
        <div style="text-align: right; font-size: 10px; margin-top: 5px; color: var(--text-dim);">{{ m.time }}</div>
    </div>
    {% endfor %}
</div>

<div id="controls">
    <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()">
    <button class="btn btn-file" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-paperclip"></i>
        <span>ANEXAR</span>
    </button>
    
    <input type="text" id="messageInput" placeholder="Digite sua mensagem aqui..." onkeypress="if(event.key==='Enter') sendMessage()">
    
    <button class="btn btn-send" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
        <span>ENVIAR</span>
    </button>
</div>

<script src="https://jit.si"></script>
<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    let jitsiApi = null;

    function toggleVideo() {
        const win = document.getElementById('video-window');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'block';
            const options = {
                roomName: "Agape_" + room,
                parentNode: document.getElementById('jitsi-container'),
                width: '100%', height: '100%',
                userInfo: { displayName: user },
                interfaceConfigOverwrite: { RECENT_LIST_ENABLED: false }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        } else {
            win.style.display = 'none';
            if(jitsiApi) jitsiApi.dispose();
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if(input.value.trim()){
            socket.emit('send_message', {user, room, message: input.value});
            input.value = '';
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) return;
        
        const fd = new FormData();
        fd.append('file', fileInput.files[0]); // Corrigido para pegar o primeiro arquivo
        fd.append('user', user);
        fd.append('room', room);

        try {
            const res = await fetch('/upload', {method: 'POST', body: fd});
            if(res.ok) fileInput.value = '';
            else alert("Erro no servidor ao subir arquivo.");
        } catch (err) {
            alert("Erro de conexão ao subir arquivo.");
        }
    }

    socket.on('receive_message', (data) => {
        const chat = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${data.user}</b><span>${data.text}</span><div style="text-align: right; font-size: 10px; margin-top: 5px; color: var(--text-dim);">${data.time}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });

    window.onload = () => {
        const chat = document.getElementById('chat-box');
        chat.scrollTop = chat.scrollHeight;
    };
</script>

</body>
</html>
