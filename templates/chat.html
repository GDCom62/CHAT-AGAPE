<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ágape Premium Chat</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --card: #1e293b; --logo-url: url('/logo.png'); }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: var(--bg); color: #fff; }
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid #334155; padding: 15px; overflow-y: auto; }
        #chat-main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: #334155; padding: 12px; border-radius: 12px; margin-bottom: 10px; position: relative; padding-left: 50px; }
        .msg::before { content: ""; position: absolute; left: 10px; top: 10px; width: 30px; height: 30px; background: var(--logo-url) center/contain no-repeat; border-radius: 50%; background-color: #fff; }
        #video-window { position: fixed; top: 70px; right: 20px; width: 300px; height: 220px; background: #000; display: none; border: 2px solid var(--primary); border-radius: 10px; overflow: hidden; z-index: 1000; }
        #controls { padding: 20px; display: flex; gap: 10px; background: var(--card); border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .btn-c { border: none; cursor: pointer; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="sidebar">
    <h3 style="color: var(--primary); font-size: 14px;">🟢 ONLINE</h3>
    <div id="user-list">Buscando...</div>
</div>
<div id="chat-main">
    <header>
        <span><img src="/logo.png" height="30" onerror="this.style.display='none'"> <b>ÁGAPE PREMIUM</b></span>
        <button onclick="toggleVideo()" style="background:#22c55e; border:none; color:#fff; padding:5px 15px; border-radius:10px; cursor:pointer;"><i class="fas fa-video"></i> VÍDEO</button>
    </header>
    <div id="video-window"><div id="jitsi-container" style="height:100%"></div></div>
    <div id="chat-box">
        {% for m in history %}<div class="msg"><b>{{m.user}}</b>: {{m.text|safe}}</div>{% endfor %}
    </div>
    <div id="controls">
        <input type="file" id="fIn" style="display:none" onchange="up()">
        <button class="btn-c" onclick="document.getElementById('fIn').click()" style="background:#64748b;"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="mIn" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn-c" onclick="send()" style="background:var(--primary);"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
<script src="https://jit.si"></script>
<script>
    const socket = io();
    const urlP = new URLSearchParams(window.location.search);
    const user = urlP.get('user') || "Irmão";
    const room = urlP.get('room') || "agape_oficial";

    async function getOnline() {
        const r = await fetch('/usuarios'); const us = await r.json();
        document.getElementById('user-list').innerHTML = us.map(u => `<div style="padding:5px; font-size:13px;">● ${u}</div>`).join('');
    }
    function send() {
        const i = document.getElementById('mIn');
        if(i.value){ socket.emit('send_message', {user, room, message: i.value}); i.value=''; }
    }
    async function up() {
        const f = document.getElementById('fIn');
        const fd = new FormData(); fd.append('file', f.files[0]); fd.append('user', user); fd.append('room', room);
        await fetch('/upload', {method:'POST', body:fd}); f.value='';
    }
    function toggleVideo() {
        const v = document.getElementById('video-window');
        if(v.style.display==='none' || !v.style.display){
            v.style.display='block';
            new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Agape_Room_" + room, parentNode: document.getElementById('jitsi-container'), userInfo: {displayName: user} });
        } else { v.style.display='none'; }
    }
    socket.on('receive_message', d => {
        document.getElementById('chat-box').innerHTML += `<div class="msg"><b>${d.user}</b>: ${d.text}</div>`;
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    });
    setInterval(getOnline, 5000); getOnline();
    setInterval(() => fetch(`/?user=${user}&room=${room}`), 30000);
</script>
</body>
</html>
