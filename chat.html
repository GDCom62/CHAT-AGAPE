<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #dadbd3; }
        
        /* Cabeçalho */
        .header { background-color: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; position: fixed; top: 0; width: 100%; height: 60px; z-index: 1000; }
        .header h3 { margin-left: 10px; font-size: 18px; }

        /* Área de Mensagens */
        .chat-container { margin-top: 60px; margin-bottom: 70px; padding: 15px; display: flex; flex-direction: column; }
        
        .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; position: relative; font-size: 14.5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        /* Estilo Balão Recebido */
        .received { background-color: white; align-self: flex-start; }
        
        /* Estilo Balão Enviado */
        .sent { background-color: #dcf8c6; align-self: flex-end; }

        /* Rodapé de Digitação */
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; margin-right: 10px; }
        button { background-color: #075e54; color: white; border: none; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="width: 40px; height: 40px; background: #ccc; border-radius: 50%;"></div>
        <h3>{{ room }} ({{ user }})</h3>
    </div>

    <div class="chat-container" id="chat">
        <!-- Exemplo de mensagens -->
        <div class="message received">Bem-vindo ao grupo {{ room }}!</div>
        <div class="message sent">Olá! Como posso ajudar?</div>
    </div>

    <form class="input-area" id="msgForm">
        <input type="text" id="msgInput" placeholder="Digite uma mensagem" required>
        <button type="submit">➤</button>
    </form>

    <script>
        // Lógica simples para mostrar a mensagem na tela sem recarregar (Simulação)
        const form = document.getElementById('msgForm');
        const input = document.getElementById('msgInput');
        const chat = document.getElementById('chat');

        form.onsubmit = (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const div = document.createElement('div');
                div.className = 'message sent';
                div.textContent = input.value;
                chat.appendChild(div);
                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        };
    </script>
</body>
</html>
