<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapRedis Clone</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        <!-- No final do chat-box, adicione o elemento de áudio -->
<audio id="notif-sound" src="https://mixkit.co" preload="auto"></audio>

<script>
    const chatBox = document.getElementById('chat-box');
    const sound = document.getElementById('notif-sound');
    const room = "{{ room }}";

    const source = new EventSource(`/stream/${room}`);
    
    source.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.status) return;

        const div = document.createElement('div');
        const isMine = data.user === "{{ user }}";
        div.className = `msg ${isMine ? 'mine' : 'others'}`;

        // Lógica de Imagem vs Texto
        let content = data.text;
        if (data.type === 'image') {
            content = `<img src="${data.text}" style="max-width:100%; border-radius:5px; margin-top:5px;">`;
        }

        div.innerHTML = `
            ${!isMine ? `<span class="user">${data.user}</span>` : ''}
            ${content}
            <span class="time">${data.time}</span>
        `;
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;

        // Toca som se for mensagem de outro usuário
        if (!isMine) sound.play().catch(e => console.log("Som bloqueado pelo navegador"));
    };
    
    // Ao enviar, inclua o nome da sala no FormData
    document.getElementById('msg-form').onsubmit = function(e) {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        const formData = new FormData();
        formData.append('message', input.value);
        formData.append('room', room); // IMPORTANTE
        fetch('/post', { method: 'POST', body: formData });
        input.value = '';
    };
</script>

        .msg { max-width: 70%; padding: 8px 12px; border-radius: 10px; position: relative; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .others { align-self: flex-start; background: white; border-top-left-radius: 0; }
        
        .user { font-weight: bold; font-size: 0.75em; display: block; color: #075e54; margin-bottom: 2px; }
        .time { font-size: 0.65em; color: #999; float: right; margin-top: 5px; margin-left: 10px; }

        footer { background: #f0f0f0; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 15px; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<header>
    <span>ZapRedis - Logado como: <strong>{{ user }}</strong></span>
    <a href="/logout" style="color: white; font-size: 0.8em;">Sair</a>
</header>

<div id="chat-box">
    {% for m in history %}
        <div class="msg {{ 'mine' if m.user == user else 'others' }}">
            {% if m.user != user %}<span class="user">{{ m.user }}</span>{% endif %}
            {{ m.text }}
            <span class="time">{{ m.time }}</span>
        </div>
    {% endfor %}
</div>

<footer>
    <form id="msg-form" style="display: flex; width: 100%; gap: 10px;">
        <input type="text" id="msg-input" placeholder="Digite uma mensagem" autocomplete="off" required>
        <button type="submit">➤</button>
    </form>
</footer>

<script>
    const chatBox = document.getElementById('chat-box');
    const currentUser = "{{ user }}";

    // Mantém o chat no final ao carregar
    chatBox.scrollTop = chatBox.scrollHeight;

    // Conecta ao Stream de eventos (SSE)
    const source = new EventSource("/stream");
    
    source.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.status === "connected") return;

        const div = document.createElement('div');
        const isMine = data.user === currentUser;
        
        div.className = `msg ${isMine ? 'mine' : 'others'}`;
        div.innerHTML = `
            ${!isMine ? `<span class="user">${data.user}</span>` : ''}
            ${data.text}
            <span class="time">${data.time}</span>
        `;
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    // Envio de mensagem sem recarregar a página
    document.getElementById('msg-form').onsubmit = function(e) {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        const formData = new FormData();
        formData.append('message', input.value);
        
        fetch('/post', { method: 'POST', body: formData });
        input.value = '';
    };
</script>

</body>
</html>
