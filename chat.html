<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Python Pro</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cloudflare.com"></script>
    <script src='https://jit.si'></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* BARRA DE FERRAMENTAS (BOTÕES QUE VOCÊ PRECISA VER) */
        .toolbar { 
            background: #075e54; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            gap: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .btn-tool { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: center;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* ÁREA DE MENSAGENS */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background-image: url('https://githubusercontent.com'); 
        }
        .msg { 
            max-width: 80%; 
            padding: 10px; 
            border-radius: 10px; 
            font-size: 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            line-height: 1.4;
            position: relative;
        }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg-info { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #075e54; }

        /* RODAPÉ DE DIGITAÇÃO */
        .footer { background: #f0f0f0; padding: 12px; display: flex; align-items: center; gap: 10px; }
        .footer input { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        .btn-send { background: #075e54; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        /* CAMADA DE VÍDEO */
        #video-layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; }
        .close-video { position:absolute; top:20px; right:20px; z-index:10000; padding:12px 20px; background:red; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <!-- TELA DE VÍDEO (INVISÍVEL ATÉ CLICAR NO BOTÃO) -->
    <div id="video-layer">
        <button class="close-video" onclick="location.reload()">ENCERRAR VÍDEO</button>
        <div id="jitsi-container" style="height: 100%;"></div>
    </div>

    <!-- BOTÕES SUPERIORES -->
    <div class="toolbar">
        <button class="btn-tool" style="background: #34b7f1;" onclick="startVideo()">📹 Vídeo</button>
        
        <label class="btn-tool" style="background: #ff5722; cursor: pointer;">
            📎 Anexo <input type="file" id="file-input" style="display:none" onchange="sendFile()">
        </label>
        
        <button id="mic-btn" class="btn-tool" style="background: #25d366;" onclick="toggleAudio()">🎤 Áudio</button>
    </div>

    <!-- JANELA DE CHAT -->
    <div id="chat-window"></div>

    <!-- BARRA DE MENSAGEM -->
    <form class="footer" id="msg-form">
        <input type="text" id="msg-input" placeholder="Digite uma mensagem..." autocomplete="off">
        <button type="submit" class="btn-send">➤</button>
    </form>

    <script>
        const socket = io();
        const user = "{{ user }}";
        const room = "{{ room }}";
        const chatWindow = document.getElementById('chat-window');
        let mediaRecorder, audioChunks = [];

        // Conectar na sala
        socket.emit('join', { user, room });

        // Função para colocar mensagem na tela
        function appendMsg(data) {
            const div = document.createElement('div');
            const isMe = data.user === user;
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<span class="msg-info">${data.user}</span>${data.msg}`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Receber mensagens e histórico
        socket.on('receive_message', appendMsg);
        socket.on('load_history', (history) => {
            chatWindow.innerHTML = '';
            history.forEach(appendMsg);
        });

        // Enviar Texto
        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('send_message', { user, room, msg: input.value });
                input.value = '';
            }
        };

        // ENVIAR ARQUIVO (ANEXO)
        async function sendFile() {
            const fileInput = document.getElementById('file-input');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            const link = `<a href="${data.url}" target="_blank" style="color:#075e54; font-weight:bold;">📄 Arquivo: ${data.name}</a>`;
            socket.emit('send_message', { user, room, msg: link });
        }

        // VÍDEO CHAMADA (JITSI)
        function startVideo() {
            document.getElementById('video-layer').style.display = 'block';
            new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "ZapPy_" + room,
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: user }
            });
        }

        // GRAVAR ÁUDIO
        async function toggleAudio() {
            const btn = document.getElementById('mic-btn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    const formData = new FormData();
                    formData.append('file', new File([audioBlob], "audio.ogg"));
                    
                    const res = await fetch('/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    socket.emit('send_message', { user, room, msg: `<audio controls src="${data.url}"></audio>` });
                    audioChunks = [];
                };
                mediaRecorder.start();
                btn.style.background = "red"; btn.innerText = "🛑 Parar";
            } else {
                mediaRecorder.stop();
                btn.style.background = "#25d366"; btn.innerText = "🎤 Áudio";
            }
        }
    </script>
</body>
</html>
