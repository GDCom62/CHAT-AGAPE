<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    const chatWindow = document.getElementById('chat-window');

    socket.emit('join', { user: user, room: room });

    // Função auxiliar para renderizar balões na tela
    function addMessageToScreen(data) {
        const div = document.createElement('div');
        const isMe = data.user === user;
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `<small>${data.user}</small> ${data.msg}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Carrega mensagens antigas vindas do banco
    socket.on('load_history', (messages) => {
        chatWindow.innerHTML = ''; // Limpa antes de carregar
        messages.forEach(m => addMessageToScreen(m));
    });

    // Recebe nova mensagem em tempo real
    socket.on('receive_message', (data) => {
        addMessageToScreen(data);
    });

    // Enviar mensagem (mesmo código de antes)
    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (input.value.trim()) {
            socket.emit('send_message', { user: user, room: room, msg: input.value });
            input.value = '';
        }
    };

    // Atualizar lista (mesmo código de antes)
    socket.on('update_users', (users) => {
        const userList = document.getElementById('userList');
        userList.innerHTML = 'Online: ';
        users.forEach(u => userList.innerHTML += `<span class="user-tag">${u}</span>`);
    });
</script>
