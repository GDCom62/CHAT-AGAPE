<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Python Pro</title>
    <script src="https://cloudflare.com"></script>
    <script src='https://jit.si'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        
        /* BARRA DE FERRAMENTAS */
        .toolbar { background: #075e54; padding: 10px; display: flex; justify-content: space-around; gap: 5px; }
        .btn-t { flex: 1; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
        
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); line-height: 1.4; }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }

        .footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        
        #video-layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; }
    </style>
</head>
<body>

<div id="video-layer">
    <button onclick="location.reload()" style="position:absolute; top:20px; right:20px; z-index:1001; padding:10px; background:red; color:white; border:none; border-radius:5px; cursor:pointer;">FECHAR VÍDEO</button>
    <div id="meet" style="height:100%"></div>
</div>

<div class="toolbar">
    <button class="btn-t" style="background: #34b7f1;" onclick="startVideo()">📹 VÍDEO</button>
    <label class="btn-t" style="background: #ff5722;">
        📎 ANEXO <input type="file" id="f-in" style="display:none" onchange="upFile()">
    </label>
    <button id="mic" class="btn-t" style="background: #25d366;" onclick="controlAudio()">🎤 ÁUDIO</button>
</div>

<div id="chat"></div>

<form class="footer" onsubmit="sendMsg(event)">
    <input type="text" id="m-in" placeholder="Digite uma mensagem..." autocomplete="off">
    <button type="submit" style="background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➤</button>
</form>

<script>
const socket = io();
const user = "{{user}}", room = "{{room}}";
let recorder, chunks = [];

socket.emit('join', {user, room});

function render(d) {
    const div = document.createElement('div');
    div.className = `msg ${d.user === user ? 'sent' : 'received'}`;
    div.innerHTML = `<small style="display:block; color:#075e54; font-weight:bold;">${d.user}</small>${d.msg}`;
    document.getElementById('chat').appendChild(div);
    document.getElementById('chat').scrollTop = 99999;
}

socket.on('receive_message', render);
socket.on('load_history', (data) => { 
    document.getElementById('chat').innerHTML = '';
    data.forEach(render); 
});

function sendMsg(e) {
    e.preventDefault();
    const el = document.getElementById('m-in');
    if(el.value) { socket.emit('send_message', {user, room, msg: el.value}); el.value=''; }
}

async function upFile() {
    const file = document.getElementById('f-in').files[0];
    const fd = new FormData(); fd.append('file', file);
    const res = await fetch('/upload', {method:'POST', body:fd});
    const d = await res.json();
    socket.emit('send_message', {user, room, msg: `<a href="${d.url}" target="_blank">📄 Arquivo: ${d.name}</a>`});
}

function startVideo() {
    document.getElementById('video-layer').style.display = 'block';
    new JitsiMeetExternalAPI("meet.jit.si", { roomName: "PyRoom"+room, parentNode: document.querySelector('#meet') });
}

async function controlAudio() {
    const btn = document.getElementById('mic');
    if (!recorder || recorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const fd = new FormData(); fd.append('file', new File([new Blob(chunks)], "audio.ogg"));
            const res = await fetch('/upload', {method:'POST', body:fd});
            const d = await res.json();
            socket.emit('send_message', {user, room, msg: `<audio controls src="${d.url}"></audio>`});
            chunks = [];
        };
        recorder.start();
        btn.innerText = "🛑 PARAR"; btn.style.background = "red";
    } else {
        recorder.stop();
        btn.innerText = "🎤 ÁUDIO"; btn.style.background = "#25d366";
    }
}
</script>
</body>
</html>
