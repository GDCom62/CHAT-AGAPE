<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Pro</title>
    <script src="https://cloudflare.com"></script>
    <script src='https://jit.si'></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e5ddd5; }
        /* BARRA DE BOTÕES DE ACESSO RÁPIDO NO TOPO */
        .tools { background: #075e54; padding: 10px; display: flex; gap: 10px; justify-content: center; }
        .btn-tool { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px; border-radius: 5px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 1px gray; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        
        .footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        #video-ui { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:999; }
    </style>
</head>
<body>

<div id="video-ui">
    <button onclick="stopVideo()" style="position:absolute; top:10px; right:10px; z-index:1000; padding:15px; background:red; color:white;">DESLIGAR</button>
    <div id="meet" style="height:100%"></div>
</div>

<div class="tools">
    <button class="btn-tool" style="background: #34b7f1;" onclick="startVideo()">📹 ABRIR VÍDEO</button>
    <label class="btn-tool" style="background: #ff5722; cursor:pointer;">
        📎 ANEXAR <input type="file" id="file-in" style="display:none" onchange="sendFile()">
    </label>
    <button id="btn-mic" class="btn-tool" style="background: #25d366;" onclick="toggleAudio()">🎤 GRAVAR ÁUDIO</button>
</div>

<div id="chat"></div>

<form class="footer" onsubmit="sendText(event)">
    <input type="text" id="minput" placeholder="Mensagem...">
    <button type="submit" style="background:#075e54; color:white; border-radius:50%; width:40px; height:40px; border:none;">➤</button>
</form>

<script>
const socket = io();
const user = "{{user}}", room = "{{room}}";
let mediaRecorder, audioChunks = [];

socket.emit('join', {user, room});

socket.on('receive_message', (d) => {
    const div = document.createElement('div');
    div.className = `msg ${d.user === user ? 'sent' : 'received'}`;
    div.innerHTML = `<b>${d.user}:</b><br>${d.msg}`;
    document.getElementById('chat').appendChild(div);
    document.getElementById('chat').scrollTop = 99999;
});

socket.on('load_history', (data) => data.forEach(d => socket.emit('receive_message', d)));

function sendText(e) {
    e.preventDefault();
    const i = document.getElementById('minput');
    if(i.value) { socket.emit('send_message', {user, room, msg: i.value}); i.value=''; }
}

async function sendFile() {
    const f = document.getElementById('file-in').files[0];
    const fd = new FormData(); fd.append('file', f);
    const res = await fetch('/upload', {method:'POST', body:fd});
    const d = await res.json();
    socket.emit('send_message', {user, room, msg: `<a href="${d.url}" target="_blank">📄 Arquivo: ${d.name}</a>`});
}

function startVideo() {
    document.getElementById('video-ui').style.display = 'block';
    new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Room"+room, parentNode: document.querySelector('#meet'), userInfo: {displayName: user} });
}

function stopVideo() { location.reload(); }

// FUNÇÃO DE ÁUDIO
async function toggleAudio() {
    const btn = document.getElementById('btn-mic');
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/ogg' });
            const fd = new FormData(); fd.append('file', new File([blob], "audio.ogg"));
            const res = await fetch('/upload', {method:'POST', body:fd});
            const d = await res.json();
            socket.emit('send_message', {user, room, msg: `<audio controls src="${d.url}"></audio>`});
            audioChunks = [];
        };
        mediaRecorder.start();
        btn.style.background = "red"; btn.innerText = "🛑 PARAR";
    } else {
        mediaRecorder.stop();
        btn.style.background = "#25d366"; btn.innerText = "🎤 GRAVAR ÁUDIO";
    }
}
</script>
</body>
</html>
