<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapPython Pro</title>
    <script src="https://cloudflare.com"></script>
    <script src='https://jit.si'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; height: 60px; z-index: 10; }
        .online-bar { background: #fff; padding: 5px 15px; font-size: 12px; border-bottom: 1px solid #ddd; overflow-x: auto; white-space: nowrap; }
        .user-tag { background: #25d366; color: white; padding: 2px 8px; border-radius: 10px; margin-right: 5px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://githubusercontent.com'); }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .msg small { display: block; font-weight: bold; font-size: 11px; margin-bottom: 3px; }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        
        .footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .footer input[type="text"] { flex: 1; padding: 10px 15px; border: none; border-radius: 20px; outline: none; }
        .btn-action { background: #075e54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; }
        .close-vid { position: absolute; top: 10px; right: 10px; z-index: 110; background: #ff2e2e; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="video-container">
    <button class="close-vid" onclick="stopVideo()">Sair da Chamada</button>
    <div id="meet" style="height: 100%;"></div>
</div>

<div class="header">
    <div>
        <h3 id="room-title">{{ room }}</h3>
        <small>Logado como: {{ user }}</small>
    </div>
    <button onclick="startVideo()" style="background:none; border:none; font-size:24px; cursor:pointer;">📹</button>
</div>

<div class="online-bar" id="userList">Online: </div>

<div id="chat-window"></div>

<form class="footer" id="chat-form">
    <label style="cursor:pointer; font-size:22px;">
        📎<input type="file" id="file-input" style="display:none" onchange="sendFile()">
    </label>
    <input type="text" id="msg-input" placeholder="Mensagem" autocomplete="off">
    <button type="submit" class="btn-action">➤</button>
</form>

<script>
    const socket = io();
    const user = "{{ user }}";
    const room = "{{ room }}";
    const chatWindow = document.getElementById('chat-window');
    let jitsiApi = null;

    socket.emit('join', { user, room });

    function addMsg(data) {
        const div = document.createElement('div');
        const isMe = data.user === user;
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `<small>${data.user}</small> ${data.msg}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    socket.on('load_history', (msgs) => { chatWindow.innerHTML = ''; msgs.forEach(addMsg); });
    socket.on('receive_message', addMsg);
    socket.on('update_users', (users) => {
        document.getElementById('userList').innerHTML = 'Online: ' + users.map(u => `<span class="user-tag">${u}</span>`).join('');
    });

    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if(input.value.trim()) {
            socket.emit('send_message', { user, room, msg: input.value });
            input.value = '';
        }
    };

    async function sendFile() {
        const fileInput = document.getElementById('file-input');
        if(!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        const link = `<a href="${data.url}" target="_blank" style="color:#075e54">📄 Arquivo: ${data.name}</a>`;
        socket.emit('send_message', { user, room, msg: link });
    }

    function startVideo() {
        document.getElementById('video-container').style.display = 'block';
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: "PythonRoom_" + room,
            parentNode: document.querySelector('#meet'),
            userInfo: { displayName: user }
        });
    }

    function stopVideo() {
        if(jitsiApi) jitsiApi.dispose();
        document.getElementById('video-container').style.display = 'none';
    }
</script>
</body>
</html>
